<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>US News 2026 — CS Graduate Rankings Top 100</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --surface:#0f1422; --surface2:#151c30; --border:#1d2540;
  --text:#dde2f0; --muted:#58638a; --accent:#e8c84a;
  --t1:#f0455a; --t2:#ff8c3a; --t3:#3dd68c; --t4:#38b4f5;
  --HH: 56px;   /* header height */
  --SB: 290px;  /* sidebar width */
  --TB: 56px;   /* tab bar height */
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

/* ═══════════════════════════════════════
   HEADER  — fixed top strip
═══════════════════════════════════════ */
#header {
  position:fixed; inset:0 0 auto 0; height:var(--HH); z-index:500;
  background:rgba(8,11,18,.97); backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 18px; gap:12px;
}
.brand { display:flex; flex-direction:column; gap:1px; }
.eyebrow { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.14em; color:var(--accent); text-transform:uppercase; }
.htitle { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; letter-spacing:-.02em; }
.htitle span { color:var(--accent); }

/* desktop tier legend */
.leg-row { display:flex; gap:4px; }
.leg {
  display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px;
  border:1px solid var(--border); cursor:pointer; transition:all .18s; user-select:none;
}
.leg.on  { background:var(--surface2); }
.leg.off { opacity:.28; }
.leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.leg-txt { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; }

/* mobile filter button (hidden on desktop) */
#filterBtn {
  display:none; align-items:center; gap:5px; padding:6px 12px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface2); cursor:pointer;
  color:var(--text); font-family:'Space Mono',monospace; font-size:10px; font-weight:700; flex-shrink:0;
}

/* ═══════════════════════════════════════
   SIDEBAR  — fixed left panel (desktop)
═══════════════════════════════════════ */
#sidebar {
  position:fixed; inset:var(--HH) auto 0 0; width:var(--SB); z-index:400;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.srch { padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.srch input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:13px; padding:8px 12px; outline:none; transition:border-color .2s;
}
.srch input::placeholder { color:var(--muted); }
.srch input:focus { border-color:var(--accent); }
#schoolList { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
#schoolList::-webkit-scrollbar { width:3px; }
#schoolList::-webkit-scrollbar-thumb { background:var(--border); }

/* ═══════════════════════════════════════
   MAP WRAPPER + MAP
═══════════════════════════════════════ */
#mapWrap {
  position:fixed; inset:var(--HH) 0 0 var(--SB); z-index:100;
  overflow:hidden;
}
#map {
  width:100%; height:100%;
}

/* ═══════════════════════════════════════
   SCHOOL CARDS
═══════════════════════════════════════ */
.tier-hdr {
  padding:7px 12px 4px; font-family:'Space Mono',monospace; font-size:9px;
  font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px;
  position:sticky; top:0; background:var(--surface); z-index:5;
}
.tier-dot { width:7px; height:7px; border-radius:50%; }

.scard {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .12s; border-left:3px solid transparent;
}
.scard:hover, .scard.sel { background:var(--surface2); }
.scard.t1{border-left-color:var(--t1);} .scard.t2{border-left-color:var(--t2);}
.scard.t3{border-left-color:var(--t3);} .scard.t4{border-left-color:var(--t4);}
.rnk {
  font-family:'Space Mono',monospace; font-size:9px; font-weight:700;
  width:30px; height:30px; border-radius:7px; flex-shrink:0; margin-top:1px;
  display:flex; align-items:center; justify-content:center;
}
.sname { font-size:12px; font-weight:500; line-height:1.35; }
.scity { font-size:10.5px; color:var(--muted); margin-top:2px; }
.card-links { display:flex; gap:5px; margin-top:6px; }
.cl {
  font-family:'Space Mono',monospace; font-size:9px; font-weight:700;
  padding:3px 7px; border-radius:4px; text-decoration:none;
  display:inline-flex; align-items:center; gap:3px; transition:opacity .15s;
}
.cl:hover { opacity:.75; }
.cl-map { background:#1a73e822; color:#1a73e8; border:1px solid #1a73e844; }
.cl-web { background:var(--surface); color:var(--muted); border:1px solid var(--border); }

/* ═══════════════════════════════════════
   STATS PILL
═══════════════════════════════════════ */
#statsPill {
  position:fixed; bottom:18px; left:calc(var(--SB) + 50%); transform:translateX(-50%);
  z-index:300; pointer-events:none;
  background:rgba(8,11,18,.9); backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:30px; display:flex; overflow:hidden;
}
.sp { padding:6px 16px; text-align:center; border-right:1px solid var(--border); }
.sp:last-child { border-right:none; }
.sp-n { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:var(--accent); }
.sp-l { font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }

/* ═══════════════════════════════════════
   INFO WINDOW
═══════════════════════════════════════ */
.iw { padding:4px 2px; min-width:230px; max-width:270px; font-family:'DM Sans',sans-serif; }
.iw-r { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; margin-bottom:4px; }
.iw-n { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; line-height:1.25; margin-bottom:4px; color:#111; }
.iw-c { font-size:11px; color:#666; }
.iw-hr { border:none; border-top:1px solid #e8eaf0; margin:9px 0 8px; }
.iw-btns { display:flex; gap:6px; }
.iw-btn {
  display:inline-flex; align-items:center; gap:5px; padding:7px 11px; border-radius:7px;
  font-size:11px; font-weight:600; text-decoration:none; font-family:'DM Sans',sans-serif;
  transition:opacity .15s; white-space:nowrap; flex:1; justify-content:center;
}
.iw-btn:hover { opacity:.82; }
.iw-bm { background:#1a73e8; color:#fff; }
.iw-bw { background:#f1f3f4; color:#333; border:1px solid #dadce0; }

/* ═══════════════════════════════════════
   MOBILE FILTER PANEL
═══════════════════════════════════════ */
#filterPanel {
  position:fixed; inset:var(--HH) 0 auto 0; z-index:490;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 14px; gap:6px; flex-wrap:wrap;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  display:none;
}
#filterPanel.open { display:flex; }
#filterPanel .leg { padding:7px 14px; }
#filterPanel .leg-txt { font-size:11px; }

/* ═══════════════════════════════════════
   MOBILE: TAB BAR
═══════════════════════════════════════ */
#tabBar {
  display:none;
  position:fixed; inset:auto 0 0 0; height:var(--TB); z-index:500;
  background:rgba(8,11,18,.97); backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
}
.tab-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; cursor:pointer; background:none; border:none; color:var(--muted);
  padding:6px; transition:color .15s;
}
.tab-btn.active { color:var(--accent); }
.tab-btn svg { width:20px; height:20px; }
.tab-lbl { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; }

/* ═══════════════════════════════════════
   MOBILE: BOTTOM SHEET
═══════════════════════════════════════ */
#bottomSheet {
  position:fixed; inset:auto 0 0 0; z-index:450;
  background:var(--surface); border-radius:20px 20px 0 0;
  border-top:1px solid var(--border); box-shadow:0 -8px 40px rgba(0,0,0,.6);
  transform:translateY(100%); transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:80vh; display:flex; flex-direction:column;
}
#bottomSheet.open { transform:translateY(0); }
.sh-handle-wrap { padding:10px 16px 6px; display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0; }
.sh-handle { width:36px; height:4px; border-radius:2px; background:var(--border); }
.sh-top { display:flex; align-items:center; justify-content:space-between; width:100%; }
.sh-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; }
.sh-close {
  width:28px; height:28px; border-radius:50%; background:var(--surface2);
  border:1px solid var(--border); color:var(--muted); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; line-height:1;
}
.sh-srch { padding:0 12px 10px; flex-shrink:0; }
.sh-srch input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:14px; padding:9px 13px; outline:none; transition:border-color .2s;
}
.sh-srch input::placeholder { color:var(--muted); }
.sh-srch input:focus { border-color:var(--accent); }
#sheetList { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
#sheetList::-webkit-scrollbar { width:3px; }
#sheetList::-webkit-scrollbar-thumb { background:var(--border); }

/* ═══════════════════════════════════════
   MOBILE: LIST VIEW  (full screen list)
═══════════════════════════════════════ */
#listView {
  position:fixed; inset:var(--HH) 0 var(--TB) 0; z-index:200;
  background:var(--surface); display:none; flex-direction:column;
  overflow:hidden;
}
#listView.active { display:flex; }
.lv-srch { padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.lv-srch input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:14px; padding:9px 13px; outline:none; transition:border-color .2s;
}
.lv-srch input::placeholder { color:var(--muted); }
.lv-srch input:focus { border-color:var(--accent); }
#listViewList { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
#listViewList::-webkit-scrollbar { width:3px; }
#listViewList::-webkit-scrollbar-thumb { background:var(--border); }

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 768px) {
  :root { --HH:52px; }

  /* hide desktop elements */
  .leg-row  { display:none; }
  #sidebar  { display:none; }
  #statsPill{ display:none; }
  #mapWrap  { inset:var(--HH) 0 var(--TB) 0; left:0; }

  /* show mobile elements */
  #filterBtn { display:flex; }
  #tabBar    { display:flex; }

  /* map fills full height between header and tab bar */
  #mapWrap { inset:var(--HH) 0 var(--TB) 0; }
}

@media (max-width: 400px) {
  .htitle { font-size:13px; }
  .eyebrow { font-size:7px; }
}
</style>
</head>

let map, gmarkers=[], openIW=null;
const mob = ()=>window.innerWidth<=768;

// ── Google Maps ──
window.initMap = function(){
  map = new google.maps.Map(document.getElementById('map'),{
    center:{lat:39.5,lng:-98.0}, zoom: mob()?3:4,
    mapTypeId:'roadmap', gestureHandling:'greedy',
    disableDefaultUI:false, zoomControl:true,
    mapTypeControl:false, streetViewControl:false, fullscreenControl:!mob(),
    styles:[
      {elementType:'geometry',stylers:[{color:'#1a2235'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a9bc0'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0d111e'}]},
      {featureType:'administrative',elementType:'geometry',stylers:[{color:'#2a3555'}]},
      {featureType:'administrative.country',elementType:'labels.text.fill',stylers:[{color:'#9aa8d0'}]},
      {featureType:'administrative.land_parcel',stylers:[{visibility:'off'}]},
      {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#bbc8e8'}]},
      {featureType:'administrative.province',elementType:'labels.text.fill',stylers:[{color:'#a0b0d8'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#253050'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#2e3f6e'}]},
      {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#6a7faa'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0a0f1e'}]},
      {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#3d5580'}]},
    ],
  });

  SCHOOLS.forEach(s=>{
    const sz = s.t===1?36:s.t===2?30:s.t===3?26:22;
    const fs = s.t===1?11:s.t===2?9:8;
    const m = new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng}, map,
      icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:TC[s.t],fillOpacity:1,strokeColor:'rgba(255,255,255,0.3)',strokeWeight:1.5,scale:sz/2},
      title:s.n,
      label:{text:String(s.r),color:TTX[s.t],fontFamily:"'Space Mono',monospace",fontSize:`${fs}px`,fontWeight:'700'},
      zIndex:(5-s.t)*100,
    });
    const mu=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n+' '+s.c)}`;
    const iw=new google.maps.InfoWindow({maxWidth:300,content:`
      <div class="iw">
        <div class="iw-r" style="color:${TC[s.t]}">#${s.r} · ${TL[s.t]}</div>
        <div class="iw-n">${s.n}</div>
        <div class="iw-c">📍 ${s.c}</div>
        <hr class="iw-hr">
        <div class="iw-btns">
          <a class="iw-btn iw-bm" href="${mu}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            Google Maps
          </a>
          <a class="iw-btn iw-bw" href="${s.w}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            Official Site
          </a>
        </div>
      </div>`
    });
    m.addListener('click',()=>{
      if(openIW) openIW.close();
      iw.open(map,m);
      openIW=iw;
    });
    gmarkers.push({m,iw,s});
  });
  map.addListener('click',()=>{ if(openIW){openIW.close();openIW=null;} });
};

// ── Card HTML ──
function cardHTML(s){
  const mu=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n+' '+s.c)}`;
  return `<div class="rnk" style="background:${TC[s.t]}22;color:${TC[s.t]}">#${s.r}</div>
    <div style="flex:1;min-width:0">
      <div class="sname">${s.n}</div>
      <div class="scity">${s.c}</div>
      <div class="card-links">
        <a class="cl cl-map" href="${mu}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Maps</a>
        <a class="cl cl-web" href="${s.w}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🌐 Website</a>
      </div>
    </div>`;
}

function flyTo(s){
  if(!map) return;
  map.panTo({lat:s.lat,lng:s.lng});
  map.setZoom(mob()?9:10);
  const e=gmarkers.find(x=>x.s===s);
  if(e){ if(openIW) openIW.close(); e.iw.open(map,e.m); openIW=e.iw; }
}

function matchQ(s,q){
  const lq=q.toLowerCase();
  return s.n.toLowerCase().includes(lq)||s.c.toLowerCase().includes(lq);
}

// ── Render list into any container ──
function renderInto(elId, q, onCardClick){
  const el=document.getElementById(elId);
  el.innerHTML='';
  [1,2,3,4].forEach(t=>{
    if(!tierVis[t]) return;
    const rows=SCHOOLS.filter(s=>s.t===t&&(q===''||matchQ(s,q)));
    if(!rows.length) return;
    const h=document.createElement('div');
    h.className='tier-hdr';
    h.innerHTML=`<div class="tier-dot" style="background:${TC[t]}"></div>${TL[t]}`;
    el.appendChild(h);
    rows.forEach(s=>{
      const d=document.createElement('div');
      d.className=`scard t${s.t}`;
      d.innerHTML=cardHTML(s);
      d.addEventListener('click',()=>{
        el.querySelectorAll('.scard').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        onCardClick(s);
      });
      el.appendChild(d);
    });
  });
}

// Initial render
renderInto('schoolList','',s=>flyTo(s));
renderInto('listViewList','',s=>{ setTab('map'); setTimeout(()=>flyTo(s),80); });
renderInto('sheetList','',s=>{ closeSheet(); setTab('map'); setTimeout(()=>flyTo(s),80); });

document.getElementById('searchDesk').addEventListener('input',e=>renderInto('schoolList',e.target.value,s=>flyTo(s)));
document.getElementById('searchList').addEventListener('input',e=>renderInto('listViewList',e.target.value,s=>{ setTab('map'); setTimeout(()=>flyTo(s),80); }));
document.getElementById('searchSheet').addEventListener('input',e=>renderInto('sheetList',e.target.value,s=>{ closeSheet(); setTab('map'); setTimeout(()=>flyTo(s),80); }));

// ── Tier filter ──
function applyFilter(t){
  tierVis[t]=!tierVis[t];
  document.querySelectorAll(`.leg[data-tier="${t}"]`).forEach(el=>{
    el.classList.toggle('on',tierVis[t]);
    el.classList.toggle('off',!tierVis[t]);
  });
  gmarkers.filter(x=>x.s.t===t).forEach(x=>x.m.setMap(tierVis[t]?map:null));
  renderInto('schoolList',document.getElementById('searchDesk').value,s=>flyTo(s));
  renderInto('listViewList',document.getElementById('searchList').value,s=>{ setTab('map'); setTimeout(()=>flyTo(s),80); });
  renderInto('sheetList',document.getElementById('searchSheet').value,s=>{ closeSheet(); setTab('map'); setTimeout(()=>flyTo(s),80); });
}
document.querySelectorAll('.leg').forEach(el=>el.addEventListener('click',()=>applyFilter(+el.dataset.tier)));

// ── Mobile filter panel ──
const fp=document.getElementById('filterPanel');
document.getElementById('filterBtn').addEventListener('click',e=>{ e.stopPropagation(); fp.classList.toggle('open'); });
document.addEventListener('click',e=>{ if(!fp.contains(e.target)&&e.target!==document.getElementById('filterBtn')) fp.classList.remove('open'); });

// ── Bottom sheet ──
function openSheet(){ document.getElementById('bottomSheet').classList.add('open'); }
function closeSheet(){ document.getElementById('bottomSheet').classList.remove('open'); }
document.getElementById('sheetClose').addEventListener('click',closeSheet);

let sy=0;
const bs=document.getElementById('bottomSheet');
bs.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
bs.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-sy; if(dy>0) bs.style.transform=`translateY(${dy}px)`;},{passive:true});
bs.addEventListener('touchend',e=>{ const dy=e.changedTouches[0].clientY-sy; bs.style.transform=''; if(dy>80) closeSheet(); });

// ── Tab bar ──
function setTab(tab){
  ['tabMap','tabList','tabSearch'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const lv=document.getElementById('listView');
  if(tab==='map'){
    document.getElementById('tabMap').classList.add('active');
    lv.classList.remove('active');
    closeSheet();
  } else if(tab==='list'){
    document.getElementById('tabList').classList.add('active');
    lv.classList.add('active');
    closeSheet();
  } else {
    document.getElementById('tabSearch').classList.add('active');
    lv.classList.remove('active');
    openSheet();
    setTimeout(()=>document.getElementById('searchSheet').focus(),350);
  }
}
document.getElementById('tabMap').addEventListener('click',()=>setTab('map'));
document.getElementById('tabList').addEventListener('click',()=>setTab('list'));
document.getElementById('tabSearch').addEventListener('click',()=>setTab('search'));
