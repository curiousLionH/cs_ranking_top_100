<style>
:root {
  --bg: #080b12;
  --surface: #0f1422;
  --surface2: #151c30;
  --border: #1d2540;
  --text: #dde2f0;
  --muted: #58638a;
  --accent: #e8c84a;
  --t1: #f0455a;
  --t2: #ff8c3a;
  --t3: #3dd68c;
  --t4: #38b4f5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 60px;
  background: rgba(15,20,34,0.97); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
}
.eyebrow { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .15em; color: var(--accent); text-transform: uppercase; }
.htitle { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: -.02em; }
.htitle span { color: var(--accent); }

.legend { display: flex; gap: 5px; }
.leg {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border); cursor: pointer;
  transition: all .18s; user-select: none;
}
.leg.on { background: var(--surface2); }
.leg.off { opacity: .3; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; }
.leg-txt { font-family: 'Space Mono', monospace; font-size: 9.5px; font-weight: 700; }

.layout { display: flex; height: 100vh; padding-top: 60px; }

/* Sidebar */
.sidebar {
  width: 280px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; z-index: 100;
}
.srch { padding: 11px 13px; border-bottom: 1px solid var(--border); }
.srch input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 12px; padding: 7px 11px; outline: none; transition: border-color .2s;
}
.srch input::placeholder { color: var(--muted); }
.srch input:focus { border-color: var(--accent); }

.list { overflow-y: auto; flex: 1; }
.list::-webkit-scrollbar { width: 3px; }
.list::-webkit-scrollbar-thumb { background: var(--border); }

.thdr {
  padding: 8px 13px 4px;
  font-family: 'Space Mono', monospace; font-size: 9px;
  font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
  position: sticky; top: 0; background: var(--surface); z-index: 5;
}
.thdr-dot { width: 7px; height: 7px; border-radius: 50%; }

.scard {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 13px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
  border-left: 3px solid transparent;
}
.scard:hover, .scard.sel { background: var(--surface2); }
.scard.t1 { border-left-color: var(--t1); }
.scard.t2 { border-left-color: var(--t2); }
.scard.t3 { border-left-color: var(--t3); }
.scard.t4 { border-left-color: var(--t4); }
.rnk {
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sname { font-size: 11.5px; font-weight: 500; line-height: 1.3; }
.scity { font-size: 10px; color: var(--muted); margin-top: 1px; }
.scard-links { display: flex; gap: 6px; margin-top: 5px; }
.scard-link {
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px; text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
  transition: opacity .15s;
}
.scard-link:hover { opacity: 0.75; }
.scard-link-map { background: #1a73e822; color: #1a73e8; border: 1px solid #1a73e844; }
.scard-link-web { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

/* Map */
#map { flex: 1; }

/* Custom Info Window */
.iw-wrap { padding: 4px 2px; min-width: 240px; max-width: 280px; font-family: 'DM Sans', sans-serif; }
.iw-rank { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; margin-bottom: 4px; }
.iw-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; line-height: 1.25; margin-bottom: 4px; color: #111; }
.iw-city { font-size: 11px; color: #666; display: flex; align-items: center; gap: 4px; }
.iw-divider { border: none; border-top: 1px solid #e8eaf0; margin: 10px 0 8px; }
.iw-links { display: flex; gap: 7px; }
.iw-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 11px; border-radius: 7px; font-size: 11px; font-weight: 600;
  text-decoration: none; font-family: 'DM Sans', sans-serif;
  transition: opacity .15s; white-space: nowrap; flex: 1; justify-content: center;
}
.iw-btn:hover { opacity: 0.82; }
.iw-btn-map { background: #1a73e8; color: #fff; }
.iw-btn-web { background: #f1f3f4; color: #333; border: 1px solid #dadce0; }
.iw-badge { margin-top: 0; display: inline-block; padding: 2px 9px; border-radius: 20px; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; }

/* Stats pill */
.spill {
  position: fixed; bottom: 22px; left: calc(280px + 50%); transform: translateX(-50%);
  background: rgba(15,20,34,.92); backdrop-filter: blur(10px);
  border: 1px solid var(--border); border-radius: 30px;
  display: flex; z-index: 100; overflow: hidden;
}
.sp { padding: 7px 18px; text-align: center; border-right: 1px solid var(--border); }
.sp:last-child { border-right: none; }
.sp-n { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--accent); }
.sp-l { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
</style>

  {r:89, n:"Missouri S&T",                          c:"Rolla, MO",            lat:37.9519, lng:-91.7785, t:4, w:"https://cs.mst.edu"},
  {r:90, n:"Univ. of Kentucky",                     c:"Lexington, KY",        lat:38.0306, lng:-84.4985, t:4, w:"https://www.engr.uky.edu/research-faculty/departments/computer-science"},
  {r:91, n:"Univ. of South Florida",                c:"Tampa, FL",            lat:28.0587, lng:-82.4139, t:4, w:"https://www.usf.edu/engineering/cse"},
  {r:92, n:"CUNY Graduate Center",                  c:"New York, NY",         lat:40.7484, lng:-73.9842, t:4, w:"https://www.gc.cuny.edu/computer-science"},
  {r:93, n:"Univ. of Alabama",                      c:"Tuscaloosa, AL",       lat:33.2098, lng:-87.5692, t:4, w:"https://cs.ua.edu"},
  {r:94, n:"Binghamton Univ. (SUNY)",               c:"Binghamton, NY",       lat:42.0898, lng:-75.9679, t:4, w:"https://www.binghamton.edu/computer-science"},
  {r:95, n:"Oklahoma State University",             c:"Stillwater, OK",       lat:36.1269, lng:-97.0737, t:4, w:"https://cs.okstate.edu"},
  {r:96, n:"New Mexico State University",           c:"Las Cruces, NM",       lat:32.2801, lng:-106.7497,t:4, w:"https://cs.nmsu.edu"},
  {r:97, n:"Univ. of Arkansas",                     c:"Fayetteville, AR",     lat:36.0679, lng:-94.1741, t:4, w:"https://engineering.uark.edu/computer-science-computer-engineering"},
  {r:98, n:"Univ. of Connecticut",                  c:"Storrs, CT",           lat:41.8077, lng:-72.2535, t:4, w:"https://www.cse.uconn.edu"},
  {r:99, n:"Univ. of Mississippi",                  c:"Oxford, MS",           lat:34.3654, lng:-89.5378, t:4, w:"https://engineering.olemiss.edu/eecs"},
  {r:100,n:"Portland State University",             c:"Portland, OR",         lat:45.5118, lng:-122.6844,t:4, w:"https://www.pdx.edu/computer-science"},
];

let map, markers = [], openInfoWindow = null;

// ── Google Maps init ──
window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 39.5, lng: -98.0 },
    zoom: 4,
    mapTypeId: 'roadmap',
    styles: [
      { elementType:'geometry', stylers:[{color:'#1a2235'}] },
      { elementType:'labels.text.fill', stylers:[{color:'#8a9bc0'}] },
      { elementType:'labels.text.stroke', stylers:[{color:'#0d111e'}] },
      { featureType:'administrative', elementType:'geometry', stylers:[{color:'#2a3555'}] },
      { featureType:'administrative.country', elementType:'labels.text.fill', stylers:[{color:'#9aa8d0'}] },
      { featureType:'administrative.land_parcel', stylers:[{visibility:'off'}] },
      { featureType:'administrative.locality', elementType:'labels.text.fill', stylers:[{color:'#bbc8e8'}] },
      { featureType:'administrative.province', elementType:'labels.text.fill', stylers:[{color:'#a0b0d8'}] },
      { featureType:'poi', stylers:[{visibility:'off'}] },
      { featureType:'poi.park', elementType:'geometry', stylers:[{color:'#162030'}] },
      { featureType:'road', elementType:'geometry', stylers:[{color:'#253050'}] },
      { featureType:'road', elementType:'geometry.stroke', stylers:[{color:'#1a2440'}] },
      { featureType:'road.highway', elementType:'geometry', stylers:[{color:'#2e3f6e'}] },
      { featureType:'road.highway', elementType:'labels.text.fill', stylers:[{color:'#6a7faa'}] },
      { featureType:'transit', stylers:[{visibility:'off'}] },
      { featureType:'water', elementType:'geometry', stylers:[{color:'#0a0f1e'}] },
      { featureType:'water', elementType:'labels.text.fill', stylers:[{color:'#3d5580'}] },
    ],
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
  });

  // Draw markers
  SCHOOLS.forEach(s => {
    const color = TC[s.t].replace('#','');
    const size  = s.t === 1 ? 36 : s.t === 2 ? 30 : s.t === 3 ? 26 : 22;
    const fs    = s.t === 1 ? 11 : s.t === 2 ? 9 : 8;
    const tc    = TTX[s.t] === '#fff' ? 'ffffff' : '080b12';

    // Use Google Charts API for pin icons (no external dependency)
    const svgMarker = {
      path: google.maps.SymbolPath.CIRCLE,
      fillColor: TC[s.t],
      fillOpacity: 1,
      strokeColor: 'rgba(255,255,255,0.3)',
      strokeWeight: 1.5,
      scale: size / 2,
    };

    const marker = new google.maps.Marker({
      position: { lat: s.lat, lng: s.lng },
      map: map,
      icon: svgMarker,
      title: s.n,
      label: {
        text: String(s.r),
        color: TTX[s.t],
        fontFamily: "'Space Mono', monospace",
        fontSize: `${fs}px`,
        fontWeight: '700',
      },
      zIndex: (5 - s.t) * 100,
    });

    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n + ' ' + s.c)}`;
    const infoWindow = new google.maps.InfoWindow({
      content: `
        <div class="iw-wrap">
          <div class="iw-rank" style="color:${TC[s.t]}">#${s.r} · ${TL[s.t]}</div>
          <div class="iw-name">${s.n}</div>
          <div class="iw-city">📍 ${s.c}</div>
          <hr class="iw-divider"/>
          <div class="iw-links">
            <a class="iw-btn iw-btn-map" href="${mapsUrl}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              Google Maps
            </a>
            <a class="iw-btn iw-btn-web" href="${s.w}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
              Official Site
            </a>
          </div>
        </div>`,
      maxWidth: 300,
    });

    marker.addListener('click', () => {
      if (openInfoWindow) openInfoWindow.close();
      infoWindow.open(map, marker);
      openInfoWindow = infoWindow;
    });

    markers.push({ marker, infoWindow, school: s });
  });

  // Close info window on map click
  map.addListener('click', () => {
    if (openInfoWindow) { openInfoWindow.close(); openInfoWindow = null; }
  });
};

// ── Sidebar ──
function renderList(q = '') {
  const el = document.getElementById('listEl');
  el.innerHTML = '';
  [1,2,3,4].forEach(t => {
    if (!tierVis[t]) return;
    const rows = SCHOOLS.filter(s =>
      s.t === t &&
      (q === '' || s.n.toLowerCase().includes(q.toLowerCase()) || s.c.toLowerCase().includes(q.toLowerCase()))
    );
    if (!rows.length) return;
    const h = document.createElement('div');
    h.className = 'thdr';
    h.innerHTML = `<div class="thdr-dot" style="background:${TC[t]}"></div>${TL[t]}`;
    el.appendChild(h);
    rows.forEach(s => {
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n + ' ' + s.c)}`;
      const d = document.createElement('div');
      d.className = `scard t${s.t}`;
      d.innerHTML = `
        <div class="rnk" style="background:${TC[s.t]}22;color:${TC[s.t]}">#${s.r}</div>
        <div style="flex:1;min-width:0">
          <div class="sname">${s.n}</div>
          <div class="scity">${s.c}</div>
          <div class="scard-links">
            <a class="scard-link scard-link-map" href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              📍 Maps
            </a>
            <a class="scard-link scard-link-web" href="${s.w}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              🌐 Website
            </a>
          </div>
        </div>`;
      d.addEventListener('click', () => {
        document.querySelectorAll('.scard').forEach(x => x.classList.remove('sel'));
        d.classList.add('sel');
        const entry = markers.find(m => m.school === s);
        if (entry && map) {
          map.panTo({ lat: s.lat, lng: s.lng });
          map.setZoom(10);
          if (openInfoWindow) openInfoWindow.close();
          entry.infoWindow.open(map, entry.marker);
          openInfoWindow = entry.infoWindow;
        }
      });
      el.appendChild(d);
    });
  });
}
renderList();
document.getElementById('searchBox').addEventListener('input', e => renderList(e.target.value));

// ── Legend ──
document.querySelectorAll('.leg').forEach(el => {
  el.addEventListener('click', () => {
    const t = +el.dataset.tier;
    tierVis[t] = !tierVis[t];
    el.classList.toggle('on', tierVis[t]);
    el.classList.toggle('off', !tierVis[t]);
    markers.filter(m => m.school.t === t).forEach(m => m.marker.setMap(tierVis[t] ? map : null));
    renderList(document.getElementById('searchBox').value);
  });
});
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC8AsjvG1dzVBfSpb7vlRIiNWTeQRI2xyU&callback=initMap&language=en">
</script>
