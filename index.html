<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>US News 2026 — CS Graduate Rankings Top 100</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:#080b12; color:#dde2f0; }

/* ── TOKENS ── */
:root {
  --bg:#080b12; --sur:#0f1422; --sur2:#151c30; --bdr:#1d2540;
  --txt:#dde2f0; --mut:#58638a; --acc:#e8c84a;
  --t1:#f0455a; --t2:#ff8c3a; --t3:#3dd68c; --t4:#38b4f5;
}

/* ════════════════════════════════════════════
   HEADER  z=900
════════════════════════════════════════════ */
#hdr {
  position:fixed; top:0; left:0; right:0; height:56px; z-index:900;
  background:rgba(8,11,18,.97); backdrop-filter:blur(18px);
  border-bottom:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:space-between; padding:0 18px; gap:12px;
}
.brand { display:flex; flex-direction:column; gap:1px; }
.ey { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.14em; color:var(--acc); text-transform:uppercase; }
.ht { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; letter-spacing:-.02em; }
.ht span { color:var(--acc); }

/* desktop legend */
#legRow { display:flex; gap:4px; }
.leg { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; border:1px solid var(--bdr); cursor:pointer; transition:all .18s; user-select:none; }
.leg.on  { background:var(--sur2); }
.leg.off { opacity:.28; }
.ld { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.lt { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; }

/* mobile filter button */
#filtBtn { display:none; align-items:center; gap:5px; padding:6px 12px; border-radius:20px; border:1px solid var(--bdr); background:var(--sur2); cursor:pointer; color:var(--txt); font-family:'Space Mono',monospace; font-size:10px; font-weight:700; flex-shrink:0; }

/* ════════════════════════════════════════════
   DESKTOP SIDEBAR  z=800  (left:0, top:56px, bottom:0)
════════════════════════════════════════════ */
#sidebar {
  position:fixed; top:56px; left:0; bottom:0; width:290px; z-index:800;
  background:var(--sur); border-right:1px solid var(--bdr);
  display:flex; flex-direction:column; overflow:hidden;
}
.sinput-wrap { padding:10px 12px; border-bottom:1px solid var(--bdr); flex-shrink:0; }
.sinput-wrap input, .mob-input { width:100%; background:var(--sur2); border:1px solid var(--bdr); border-radius:8px; color:var(--txt); font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 12px; outline:none; transition:border-color .2s; }
.sinput-wrap input::placeholder, .mob-input::placeholder { color:var(--mut); }
.sinput-wrap input:focus, .mob-input:focus { border-color:var(--acc); }
.slist { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
.slist::-webkit-scrollbar { width:3px; }
.slist::-webkit-scrollbar-thumb { background:var(--bdr); }

/* ════════════════════════════════════════════
   MAP WRAPPER  z=100
   Desktop: left=290px (beside sidebar)
════════════════════════════════════════════ */
#mapWrap {
  position:fixed; top:56px; right:0; bottom:0; left:290px; z-index:100;
}
#map { position:absolute; top:0; left:0; right:0; bottom:0; }

/* ════════════════════════════════════════════
   SCHOOL CARDS (shared)
════════════════════════════════════════════ */
.thdr { padding:7px 12px 4px; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; border-bottom:1px solid var(--bdr); display:flex; align-items:center; gap:6px; position:sticky; top:0; background:var(--sur); z-index:5; }
.tdot { width:7px; height:7px; border-radius:50%; }
.scard { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-bottom:1px solid var(--bdr); cursor:pointer; transition:background .12s; border-left:3px solid transparent; }
.scard:hover, .scard.sel { background:var(--sur2); }
.scard.t1{border-left-color:var(--t1);} .scard.t2{border-left-color:var(--t2);}
.scard.t3{border-left-color:var(--t3);} .scard.t4{border-left-color:var(--t4);}
.rnk { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; width:30px; height:30px; border-radius:7px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; }
.sname { font-size:12px; font-weight:500; line-height:1.35; }
.scity { font-size:10.5px; color:var(--mut); margin-top:2px; }
.clinks { display:flex; gap:5px; margin-top:6px; }
.cl { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; padding:3px 7px; border-radius:4px; text-decoration:none; display:inline-flex; align-items:center; gap:3px; transition:opacity .15s; }
.cl:hover { opacity:.75; }
.cl-m { background:#1a73e822; color:#1a73e8; border:1px solid #1a73e844; }
.cl-w { background:var(--sur); color:var(--mut); border:1px solid var(--bdr); }

/* ════════════════════════════════════════════
   STATS PILL  (desktop only)
════════════════════════════════════════════ */
#pill {
  position:fixed; bottom:18px; left:calc(290px + 50%); transform:translateX(-50%);
  z-index:200; pointer-events:none;
  background:rgba(8,11,18,.9); backdrop-filter:blur(10px);
  border:1px solid var(--bdr); border-radius:30px; display:flex; overflow:hidden;
}
.sp { padding:6px 16px; text-align:center; border-right:1px solid var(--bdr); }
.sp:last-child { border-right:none; }
.spn { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:var(--acc); }
.spl { font-family:'Space Mono',monospace; font-size:8px; color:var(--mut); letter-spacing:.1em; text-transform:uppercase; }

/* ════════════════════════════════════════════
   INFO WINDOW
════════════════════════════════════════════ */
.iw { padding:4px 2px; min-width:230px; max-width:270px; font-family:'DM Sans',sans-serif; }
.iwr { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; margin-bottom:4px; }
.iwn { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; line-height:1.25; margin-bottom:4px; color:#111; }
.iwc { font-size:11px; color:#666; }
.iwhr { border:none; border-top:1px solid #e8eaf0; margin:9px 0 8px; }
.iwbtns { display:flex; gap:6px; }
.iwb { display:inline-flex; align-items:center; gap:5px; padding:7px 11px; border-radius:7px; font-size:11px; font-weight:600; text-decoration:none; font-family:'DM Sans',sans-serif; transition:opacity .15s; white-space:nowrap; flex:1; justify-content:center; }
.iwb:hover { opacity:.82; }
.iwbm { background:#1a73e8; color:#fff; }
.iwbw { background:#f1f3f4; color:#333; border:1px solid #dadce0; }

/* ════════════════════════════════════════════
   MOBILE ONLY ELEMENTS (hidden on desktop)
════════════════════════════════════════════ */

/* Tab bar  z=900 */
#tabBar {
  display:none;
  position:fixed; left:0; right:0; bottom:0; height:56px; z-index:900;
  background:rgba(8,11,18,.97); backdrop-filter:blur(18px);
  border-top:1px solid var(--bdr);
}
.tbtn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; background:none; border:none; color:var(--mut); padding:6px; transition:color .15s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
.tbtn.act { color:var(--acc); }
.tbtn svg { width:20px; height:20px; pointer-events:none; }
.tlbl { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; pointer-events:none; }

/* Mobile List View  z=500 */
#listView {
  display:none;
  position:fixed; top:56px; right:0; bottom:56px; left:0; z-index:500;
  background:var(--sur); flex-direction:column; overflow:hidden;
}
#listView.act { display:flex; }
.lv-s { padding:10px 12px; border-bottom:1px solid var(--bdr); flex-shrink:0; }
.lv-s input { width:100%; background:var(--sur2); border:1px solid var(--bdr); border-radius:8px; color:var(--txt); font-family:'DM Sans',sans-serif; font-size:14px; padding:9px 13px; outline:none; transition:border-color .2s; }
.lv-s input::placeholder { color:var(--mut); }
.lv-s input:focus { border-color:var(--acc); }
#listViewList { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }

/* Bottom Sheet  z=700 */
#bsheet {
  display:none;
  position:fixed; left:0; right:0; bottom:56px; z-index:700;
  background:var(--sur); border-radius:20px 20px 0 0;
  border-top:1px solid var(--bdr); box-shadow:0 -8px 40px rgba(0,0,0,.6);
  transform:translateY(100%); transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:78vh; flex-direction:column;
}
#bsheet.act { transform:translateY(0); }
.bsh-wrap { padding:10px 16px 6px; display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0; }
.bsh-handle { width:36px; height:4px; border-radius:2px; background:var(--bdr); }
.bsh-top { display:flex; align-items:center; justify-content:space-between; width:100%; }
.bsh-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; }
.bsh-close { width:28px; height:28px; border-radius:50%; background:var(--sur2); border:1px solid var(--bdr); color:var(--mut); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
.bsh-s { padding:0 12px 10px; flex-shrink:0; }
.bsh-s input { width:100%; background:var(--sur2); border:1px solid var(--bdr); border-radius:8px; color:var(--txt); font-family:'DM Sans',sans-serif; font-size:14px; padding:9px 13px; outline:none; }
.bsh-s input::placeholder { color:var(--mut); }
.bsh-s input:focus { border-color:var(--acc); }
#bsheetList { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }

/* Mobile filter panel  z=850 */
#filtPanel {
  display:none;
  position:fixed; top:56px; left:0; right:0; z-index:850;
  background:var(--sur); border-bottom:1px solid var(--bdr);
  padding:10px 14px; gap:6px; flex-wrap:wrap;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#filtPanel.act { display:flex; }
#filtPanel .leg { padding:7px 14px; }
#filtPanel .lt   { font-size:11px; }

/* ════════════════════════════════════════════
   MOBILE BREAKPOINT
   Key change: mapWrap left:0 (no sidebar)
════════════════════════════════════════════ */
@media (max-width:768px) {
  /* header stays 56px */
  #hdr { height:56px; }

  /* hide desktop-only */
  #legRow  { display:none; }
  #sidebar { display:none; }
  #pill    { display:none; }

  /* show mobile-only */
  #filtBtn { display:flex; }
  #tabBar  { display:flex; }
  #listView { display:none; } /* shown via JS */
  #bsheet   { display:flex; } /* flex but translateY'd off screen */

  /* MAP: full width, header to tabbar */
  #mapWrap {
    position:fixed;
    top:56px;
    right:0;
    bottom:56px;
    left:0;
    z-index:100;
  }
}

@media (max-width:400px) {
  .ht { font-size:13px; }
  .ey { font-size:7px; }
}
</style>
</head>

let map, GM=[], openIW=null;
const mob=()=>window.innerWidth<=768;

window.initMap=function(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:39.5,lng:-98.0}, zoom:mob()?3:4,
    mapTypeId:'roadmap', gestureHandling:'greedy',
    disableDefaultUI:false, zoomControl:true,
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
    styles:[
      {elementType:'geometry',stylers:[{color:'#1a2235'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a9bc0'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0d111e'}]},
      {featureType:'administrative',elementType:'geometry',stylers:[{color:'#2a3555'}]},
      {featureType:'administrative.country',elementType:'labels.text.fill',stylers:[{color:'#9aa8d0'}]},
      {featureType:'administrative.land_parcel',stylers:[{visibility:'off'}]},
      {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#bbc8e8'}]},
      {featureType:'administrative.province',elementType:'labels.text.fill',stylers:[{color:'#a0b0d8'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#253050'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#2e3f6e'}]},
      {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#6a7faa'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0a0f1e'}]},
      {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#3d5580'}]},
    ],
  });

  SCHOOLS.forEach(s=>{
    const sz=s.t===1?36:s.t===2?30:s.t===3?26:22;
    const fs=s.t===1?11:s.t===2?9:8;
    const m=new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng},map,
      icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:TC[s.t],fillOpacity:1,strokeColor:'rgba(255,255,255,0.3)',strokeWeight:1.5,scale:sz/2},
      title:s.n,
      label:{text:String(s.r),color:TX[s.t],fontFamily:"'Space Mono',monospace",fontSize:`${fs}px`,fontWeight:'700'},
      zIndex:(5-s.t)*100,
    });
    const mu=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n+' '+s.c)}`;
    const iw=new google.maps.InfoWindow({maxWidth:300,content:`
      <div class="iw">
        <div class="iwr" style="color:${TC[s.t]}">#${s.r} · ${TL[s.t]}</div>
        <div class="iwn">${s.n}</div>
        <div class="iwc">📍 ${s.c}</div>
        <hr class="iwhr">
        <div class="iwbtns">
          <a class="iwb iwbm" href="${mu}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            Google Maps
          </a>
          <a class="iwb iwbw" href="${s.w}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            Official Site
          </a>
        </div>
      </div>`
    });
    m.addListener('click',()=>{ if(openIW)openIW.close(); iw.open(map,m); openIW=iw; });
    GM.push({m,iw,s});
  });
  map.addListener('click',()=>{ if(openIW){openIW.close();openIW=null;} });

  // After map loads, trigger resize so it fills container correctly
  google.maps.event.trigger(map,'resize');
  if(mob()) setTimeout(()=>google.maps.event.trigger(map,'resize'), 300);
};

// Card HTML
function cardHTML(s){
  const mu=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n+' '+s.c)}`;
  return `<div class="rnk" style="background:${TC[s.t]}22;color:${TC[s.t]}">#${s.r}</div>
    <div style="flex:1;min-width:0">
      <div class="sname">${s.n}</div>
      <div class="scity">${s.c}</div>
      <div class="clinks">
        <a class="cl cl-m" href="${mu}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Maps</a>
        <a class="cl cl-w" href="${s.w}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🌐 Website</a>
      </div>
    </div>`;
}

function flyTo(s){
  if(!map)return;
  if(mob()){setTab('map');}
  setTimeout(()=>{
    map.panTo({lat:s.lat,lng:s.lng});
    map.setZoom(mob()?9:10);
    const e=GM.find(x=>x.s===s);
    if(e){if(openIW)openIW.close();e.iw.open(map,e.m);openIW=e.iw;}
    google.maps.event.trigger(map,'resize');
  }, mob()?150:0);
}

function mq(s,q){if(!q)return true;const l=q.toLowerCase();return s.n.toLowerCase().includes(l)||s.c.toLowerCase().includes(l);}

function renderTo(elId,q,onClick){
  const el=document.getElementById(elId);
  el.innerHTML='';
  [1,2,3,4].forEach(t=>{
    if(!TV[t])return;
    const rows=SCHOOLS.filter(s=>s.t===t&&mq(s,q));
    if(!rows.length)return;
    const h=document.createElement('div');
    h.className='thdr';
    h.innerHTML=`<div class="tdot" style="background:${TC[t]}"></div>${TL[t]}`;
    el.appendChild(h);
    rows.forEach(s=>{
      const d=document.createElement('div');
      d.className=`scard t${s.t}`;
      d.innerHTML=cardHTML(s);
      d.addEventListener('click',()=>{el.querySelectorAll('.scard').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');onClick(s);});
      el.appendChild(d);
    });
  });
}

// Initial render all lists
renderTo('deskList','',s=>flyTo(s));
renderTo('listViewList','',s=>flyTo(s));
renderTo('bsheetList','',s=>{ closeSheet(); flyTo(s); });

// Search inputs
document.getElementById('deskSearch').addEventListener('input',e=>renderTo('deskList',e.target.value,s=>flyTo(s)));
document.getElementById('listSearch').addEventListener('input',e=>renderTo('listViewList',e.target.value,s=>flyTo(s)));
document.getElementById('sheetSearch').addEventListener('input',e=>renderTo('bsheetList',e.target.value,s=>{closeSheet();flyTo(s);}));

// Tier filter
function applyTier(t){
  TV[t]=!TV[t];
  document.querySelectorAll(`.leg[data-tier="${t}"]`).forEach(el=>{el.classList.toggle('on',TV[t]);el.classList.toggle('off',!TV[t]);});
  GM.filter(x=>x.s.t===t).forEach(x=>x.m.setMap(TV[t]?map:null));
  renderTo('deskList',document.getElementById('deskSearch').value,s=>flyTo(s));
  renderTo('listViewList',document.getElementById('listSearch').value,s=>flyTo(s));
  renderTo('bsheetList',document.getElementById('sheetSearch').value,s=>{closeSheet();flyTo(s);});
}
document.querySelectorAll('.leg').forEach(el=>el.addEventListener('click',()=>applyTier(+el.dataset.tier)));

// Mobile filter panel
const fp=document.getElementById('filtPanel');
document.getElementById('filtBtn').addEventListener('click',e=>{e.stopPropagation();fp.classList.toggle('act');});
document.addEventListener('click',e=>{if(!fp.contains(e.target)&&e.target.id!=='filtBtn')fp.classList.remove('act');});

// Bottom sheet
function openSheet(){document.getElementById('bsheet').classList.add('act');}
function closeSheet(){document.getElementById('bsheet').classList.remove('act');}
document.getElementById('bshClose').addEventListener('click',closeSheet);
const bs=document.getElementById('bsheet');
let sy=0;
bs.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
bs.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-sy;if(dy>0)bs.style.transform=`translateY(${dy}px)`;},{passive:true});
bs.addEventListener('touchend',e=>{const dy=e.changedTouches[0].clientY-sy;bs.style.transform='';if(dy>80)closeSheet();});

// Tab bar
function setTab(tab){
  ['tabMap','tabList','tabSearch'].forEach(id=>document.getElementById(id).classList.remove('act'));
  const lv=document.getElementById('listView');
  if(tab==='map'){
    document.getElementById('tabMap').classList.add('act');
    lv.classList.remove('act');
    closeSheet();
    if(map) setTimeout(()=>google.maps.event.trigger(map,'resize'),50);
  } else if(tab==='list'){
    document.getElementById('tabList').classList.add('act');
    lv.classList.add('act');
    closeSheet();
  } else {
    document.getElementById('tabSearch').classList.add('act');
    lv.classList.remove('act');
    openSheet();
    setTimeout(()=>document.getElementById('sheetSearch').focus(),350);
  }
}
document.getElementById('tabMap').addEventListener('click',()=>setTab('map'));
document.getElementById('tabList').addEventListener('click',()=>setTab('list'));
document.getElementById('tabSearch').addEventListener('click',()=>setTab('search'));
</script>
