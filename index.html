<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>US News 2026 — CS Graduate Rankings Top 100</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --surface:#0f1422; --surface2:#151c30; --border:#1d2540;
  --text:#dde2f0; --muted:#58638a; --accent:#e8c84a;
  --t1:#f0455a; --t2:#ff8c3a; --t3:#3dd68c; --t4:#38b4f5;
  --hh:56px; --tbh:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

/* ══ HEADER ══ */
header{
  position:fixed;top:0;left:0;right:0;z-index:300;height:var(--hh);
  background:rgba(8,11,18,0.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px;
}
.brand{display:flex;flex-direction:column;gap:1px;min-width:0;}
.eyebrow{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;white-space:nowrap;}
.htitle{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;}
.htitle span{color:var(--accent);}

.legend-wrap{display:flex;gap:4px;flex-shrink:0;}
.leg{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;transition:all .18s;user-select:none;white-space:nowrap;}
.leg.on{background:var(--surface2);}
.leg.off{opacity:.28;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-txt{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;}

.filter-btn{
  display:none;align-items:center;gap:5px;
  padding:6px 12px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;color:var(--text);
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0;
}

/* ══ LAYOUT ══ */
.layout{display:flex;height:100vh;padding-top:var(--hh);}

/* ── Desktop Sidebar ── */
.sidebar{
  width:290px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:100;
}
.srch{padding:10px 12px;border-bottom:1px solid var(--border);}
.srch input,.sheet-srch input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;padding:8px 12px;outline:none;transition:border-color .2s;
}
.srch input::placeholder,.sheet-srch input::placeholder{color:var(--muted);}
.srch input:focus,.sheet-srch input:focus{border-color:var(--accent);}

.list,.sheet-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.list::-webkit-scrollbar,.sheet-list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-thumb,.sheet-list::-webkit-scrollbar-thumb{background:var(--border);}

.thdr{
  padding:8px 12px 4px;font-family:'Space Mono',monospace;font-size:9px;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
  position:sticky;top:0;background:var(--surface);z-index:5;
}
.thdr-dot{width:7px;height:7px;border-radius:50%;}

.scard{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;border-left:3px solid transparent;
}
.scard:hover,.scard.sel{background:var(--surface2);}
.scard.t1{border-left-color:var(--t1);}
.scard.t2{border-left-color:var(--t2);}
.scard.t3{border-left-color:var(--t3);}
.scard.t4{border-left-color:var(--t4);}
.rnk{
  font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
  width:30px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.sname{font-size:12px;font-weight:500;line-height:1.35;}
.scity{font-size:10.5px;color:var(--muted);margin-top:2px;}
.scard-links{display:flex;gap:5px;margin-top:6px;}
.scard-link{
  font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
  padding:3px 7px;border-radius:4px;text-decoration:none;
  display:inline-flex;align-items:center;gap:3px;transition:opacity .15s;
}
.scard-link:hover{opacity:.75;}
.scard-link-map{background:#1a73e822;color:#1a73e8;border:1px solid #1a73e844;}
.scard-link-web{background:var(--surface);color:var(--muted);border:1px solid var(--border);}

/* ── Map ── */
#map{flex:1;}

/* ── Info Window ── */
.iw-wrap{padding:4px 2px;min-width:230px;max-width:270px;font-family:'DM Sans',sans-serif;}
.iw-rank{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;margin-bottom:4px;}
.iw-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1.25;margin-bottom:4px;color:#111;}
.iw-city{font-size:11px;color:#666;}
.iw-divider{border:none;border-top:1px solid #e8eaf0;margin:9px 0 8px;}
.iw-links{display:flex;gap:6px;}
.iw-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 11px;border-radius:7px;font-size:11px;font-weight:600;
  text-decoration:none;font-family:'DM Sans',sans-serif;
  transition:opacity .15s;white-space:nowrap;flex:1;justify-content:center;
}
.iw-btn:hover{opacity:.82;}
.iw-btn-map{background:#1a73e8;color:#fff;}
.iw-btn-web{background:#f1f3f4;color:#333;border:1px solid #dadce0;}

/* ── Stats Pill ── */
.spill{
  position:fixed;bottom:22px;left:calc(290px + 50%);transform:translateX(-50%);
  background:rgba(8,11,18,.92);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:30px;
  display:flex;z-index:200;overflow:hidden;pointer-events:none;
}
.sp{padding:6px 16px;text-align:center;border-right:1px solid var(--border);}
.sp:last-child{border-right:none;}
.sp-n{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--accent);}
.sp-l{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}

/* ══ MOBILE FILTER PANEL ══ */
.filter-panel{
  display:none;position:fixed;top:var(--hh);left:0;right:0;z-index:290;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px;flex-wrap:wrap;gap:6px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.filter-panel.open{display:flex;}
.filter-panel .leg{padding:7px 14px;}
.filter-panel .leg-txt{font-size:11px;}

/* ══ TAB BAR (mobile) ══ */
.tab-bar{display:none;}

/* ══ BOTTOM SHEET (mobile) ══ */
.bottom-sheet{
  display:none;
  position:fixed;left:0;right:0;bottom:0;z-index:400;
  background:var(--surface);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:82vh;flex-direction:column;
}
.bottom-sheet.open{transform:translateY(0);}
.sheet-handle-wrap{
  padding:10px 16px 6px;display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;
}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);}
.sheet-top{
  display:flex;align-items:center;justify-content:space-between;width:100%;
}
.sheet-title-txt{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.sheet-close{
  width:28px;height:28px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.sheet-srch{padding:0 12px 10px;flex-shrink:0;}

/* ══ RESPONSIVE ══ */
@media (max-width:768px){
  :root{--hh:52px;}

  .legend-wrap{display:none;}
  .filter-btn{display:flex;}

  .layout{flex-direction:column;padding-bottom:var(--tbh);}
  #map{width:100%;flex:1;}
  .sidebar{display:none;}
  .bottom-sheet{display:flex;}

  .tab-bar{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:350;
    height:var(--tbh);
    background:rgba(8,11,18,.97);backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
  }
  .tab-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;cursor:pointer;background:none;border:none;color:var(--muted);padding:6px;
    transition:color .15s;
  }
  .tab-btn.active{color:var(--accent);}
  .tab-btn svg{width:20px;height:20px;}
  .tab-lbl{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;}

  .spill{
    bottom:calc(var(--tbh) + 12px);
    left:50%;transform:translateX(-50%);
  }
  .sp{padding:5px 12px;}
  .sp-n{font-size:12px;}
  .sp-l{font-size:7px;}

  .scard{padding:12px 14px;}
  .sname{font-size:13px;}
  .scity{font-size:11px;}
  .scard-link{padding:4px 9px;font-size:10px;}
  .rnk{width:32px;height:32px;}
}

/* List view (mobile) */
body.list-view .layout{padding-bottom:var(--tbh);}
body.list-view #map{display:none;}
body.list-view .spill{display:none;}
body.list-view .bottom-sheet{display:none;}
body.list-view .sidebar{
  display:flex!important;width:100%!important;border-right:none;
  height:calc(100vh - var(--hh) - var(--tbh));
}

@media (max-width:400px){
  .htitle{font-size:13px;}
  .eyebrow{font-size:7px;}
}
</style>
</head>

let map, markers=[], openInfoWindow=null;
const isMobile=()=>window.innerWidth<=768;

// ── Google Maps ──
window.initMap=function(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:39.5,lng:-98.0}, zoom:isMobile()?3:4,
    mapTypeId:'roadmap',
    styles:[
      {elementType:'geometry',stylers:[{color:'#1a2235'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a9bc0'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0d111e'}]},
      {featureType:'administrative',elementType:'geometry',stylers:[{color:'#2a3555'}]},
      {featureType:'administrative.country',elementType:'labels.text.fill',stylers:[{color:'#9aa8d0'}]},
      {featureType:'administrative.land_parcel',stylers:[{visibility:'off'}]},
      {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#bbc8e8'}]},
      {featureType:'administrative.province',elementType:'labels.text.fill',stylers:[{color:'#a0b0d8'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#162030'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#253050'}]},
      {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#1a2440'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#2e3f6e'}]},
      {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#6a7faa'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0a0f1e'}]},
      {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#3d5580'}]},
    ],
    disableDefaultUI:false, zoomControl:true,
    mapTypeControl:false, streetViewControl:false,
    fullscreenControl:!isMobile(), gestureHandling:'greedy',
  });

  SCHOOLS.forEach(s=>{
    const size=s.t===1?36:s.t===2?30:s.t===3?26:22;
    const fs=s.t===1?11:s.t===2?9:8;
    const marker=new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng}, map,
      icon:{
        path:google.maps.SymbolPath.CIRCLE,
        fillColor:TC[s.t],fillOpacity:1,
        strokeColor:'rgba(255,255,255,0.3)',strokeWeight:1.5,
        scale:size/2,
      },
      title:s.n,
      label:{text:String(s.r),color:TTX[s.t],fontFamily:"'Space Mono',monospace",fontSize:`${fs}px`,fontWeight:'700'},
      zIndex:(5-s.t)*100,
    });

    const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n+' '+s.c)}`;
    const iw=new google.maps.InfoWindow({
      content:`<div class="iw-wrap">
        <div class="iw-rank" style="color:${TC[s.t]}">#${s.r} · ${TL[s.t]}</div>
        <div class="iw-name">${s.n}</div>
        <div class="iw-city">📍 ${s.c}</div>
        <hr class="iw-divider"/>
        <div class="iw-links">
          <a class="iw-btn iw-btn-map" href="${mapsUrl}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            Google Maps
          </a>
          <a class="iw-btn iw-btn-web" href="${s.w}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            Official Site
          </a>
        </div>
      </div>`, maxWidth:300,
    });

    marker.addListener('click',()=>{
      if(openInfoWindow) openInfoWindow.close();
      iw.open(map,marker);
      openInfoWindow=iw;
      if(isMobile()) closeSheet();
    });
    markers.push({marker,iw,school:s});
  });

  map.addListener('click',()=>{
    if(openInfoWindow){openInfoWindow.close();openInfoWindow=null;}
  });
};

// ── Card HTML ──
function cardHTML(s){
  const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n+' '+s.c)}`;
  return `<div class="rnk" style="background:${TC[s.t]}22;color:${TC[s.t]}">#${s.r}</div>
    <div style="flex:1;min-width:0">
      <div class="sname">${s.n}</div>
      <div class="scity">${s.c}</div>
      <div class="scard-links">
        <a class="scard-link scard-link-map" href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Maps</a>
        <a class="scard-link scard-link-web" href="${s.w}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🌐 Website</a>
      </div>
    </div>`;
}

function flyTo(s){
  if(!map) return;
  map.panTo({lat:s.lat,lng:s.lng});
  map.setZoom(isMobile()?9:10);
  const e=markers.find(m=>m.school===s);
  if(e){
    if(openInfoWindow) openInfoWindow.close();
    e.iw.open(map,e.marker);
    openInfoWindow=e.iw;
  }
}

function matchQ(s,q){
  if(!q) return true;
  const lq=q.toLowerCase();
  return s.n.toLowerCase().includes(lq)||s.c.toLowerCase().includes(lq);
}

// ── Desktop list ──
function renderList(q=''){
  const el=document.getElementById('listEl');
  el.innerHTML='';
  [1,2,3,4].forEach(t=>{
    if(!tierVis[t]) return;
    const rows=SCHOOLS.filter(s=>s.t===t&&matchQ(s,q));
    if(!rows.length) return;
    const h=document.createElement('div');
    h.className='thdr';
    h.innerHTML=`<div class="thdr-dot" style="background:${TC[t]}"></div>${TL[t]}`;
    el.appendChild(h);
    rows.forEach(s=>{
      const d=document.createElement('div');
      d.className=`scard t${s.t}`;
      d.innerHTML=cardHTML(s);
      d.addEventListener('click',()=>{
        document.querySelectorAll('#listEl .scard').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        flyTo(s);
      });
      el.appendChild(d);
    });
  });
}

// ── Mobile list ──
function renderMobileList(q=''){
  const el=document.getElementById('listElMobile');
  el.innerHTML='';
  [1,2,3,4].forEach(t=>{
    if(!tierVis[t]) return;
    const rows=SCHOOLS.filter(s=>s.t===t&&matchQ(s,q));
    if(!rows.length) return;
    const h=document.createElement('div');
    h.className='thdr';
    h.innerHTML=`<div class="thdr-dot" style="background:${TC[t]}"></div>${TL[t]}`;
    el.appendChild(h);
    rows.forEach(s=>{
      const d=document.createElement('div');
      d.className=`scard t${s.t}`;
      d.innerHTML=cardHTML(s);
      d.addEventListener('click',()=>{
        document.querySelectorAll('#listElMobile .scard').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        setTab('map');
        setTimeout(()=>flyTo(s),120);
      });
      el.appendChild(d);
    });
  });
}

renderList();
renderMobileList();
document.getElementById('searchBox').addEventListener('input',e=>renderList(e.target.value));
document.getElementById('searchBoxMobile').addEventListener('input',e=>renderMobileList(e.target.value));

// ── Tier filter ──
function applyFilter(t){
  tierVis[t]=!tierVis[t];
  document.querySelectorAll(`.leg[data-tier="${t}"]`).forEach(el=>{
    el.classList.toggle('on',tierVis[t]);
    el.classList.toggle('off',!tierVis[t]);
  });
  markers.filter(m=>m.school.t===t).forEach(m=>m.marker.setMap(tierVis[t]?map:null));
  renderList(document.getElementById('searchBox').value);
  renderMobileList(document.getElementById('searchBoxMobile').value);
}
document.querySelectorAll('.leg').forEach(el=>el.addEventListener('click',()=>applyFilter(+el.dataset.tier)));

// ── Mobile filter toggle ──
const filterPanel=document.getElementById('filterPanel');
document.getElementById('filterToggle').addEventListener('click',e=>{
  e.stopPropagation();
  filterPanel.classList.toggle('open');
});
document.addEventListener('click',e=>{
  if(!filterPanel.contains(e.target)&&!document.getElementById('filterToggle').contains(e.target))
    filterPanel.classList.remove('open');
});

// ── Bottom sheet ──
const sheet=document.getElementById('bottomSheet');
function openSheet(){sheet.classList.add('open');}
function closeSheet(){sheet.classList.remove('open');}

let startY=0;
sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
sheet.addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-startY;
  if(dy>0) sheet.style.transform=`translateY(${dy}px)`;
},{passive:true});
sheet.addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-startY;
  sheet.style.transform='';
  if(dy>80) closeSheet();
});
document.getElementById('sheetClose').addEventListener('click',closeSheet);

// ── Tab bar ──
function setTab(tab){
  ['tabMap','tabList','tabSearch'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(tab==='map'){
    document.getElementById('tabMap').classList.add('active');
    document.body.classList.remove('list-view');
    closeSheet();
  } else if(tab==='list'){
    document.getElementById('tabList').classList.add('active');
    document.body.classList.add('list-view');
    closeSheet();
    renderMobileList(document.getElementById('searchBoxMobile').value);
  } else if(tab==='search'){
    document.getElementById('tabSearch').classList.add('active');
    document.body.classList.remove('list-view');
    openSheet();
    setTimeout(()=>document.getElementById('searchBoxMobile').focus(),380);
  }
}
document.getElementById('tabMap').addEventListener('click',()=>setTab('map'));
document.getElementById('tabList').addEventListener('click',()=>setTab('list'));
document.getElementById('tabSearch').addEventListener('click',()=>setTab('search'));
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC8AsjvG1dzVBfSpb7vlRIiNWTeQRI2xyU&callback=initMap&language=en">
